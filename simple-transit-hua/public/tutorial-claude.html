            <script type="text/plain" id="md-windows"># **Windows 安装教程**

## **前置要求: 安装 Git**

确保已安装 Git ,如果尚未安装，可以点击前往→ [Git 官网 https://git-scm.com/download/win](https://git-scm.com/download/win) 下载并安装(安装时一直点击“下一步”即可)。

## **前置要求：安装 Node.js**

确保 Node.js 版本 ≥ 18.0

### **检查是否已安装 Node.js**

```bash
node --version
```

如果版本低于 18.0 或未安装，请点击前往→ [Node.js 官网 https://nodejs.org/](https://nodejs.org/) 下载安装最新 LTS 版本。

---

## **清理旧版客户端（可选）**

如果你之前是通过 npm 安装的 Claude Code，为了防止冲突，建议先将其卸载：

```bash
npm uninstall -g @anthropic-ai/claude-code
```

---

## **步骤 1：安装 Claude Code（安装过Claude Code可跳过）**

请打开 PowerShell（建议右键“以管理员身份运行”），执行以下官方安装脚本：

```powershell
irm https://claude.ai/install.ps1 | iex
```

### **验证安装**
安装完成后，请关闭当前终端并重新打开一个新窗口，输入以下命令验证：

```bash
claude --version
```

---

## **步骤 2：配置环境变量**

您需要配置两个环境变量：

- `ANTHROPIC_AUTH_TOKEN`：您的授权令牌（格式：`sk_...`）
- `ANTHROPIC_BASE_URL`：API 服务地址（本站提供的连接点 URL）

### **第一推荐：CC Switch（强烈推荐）**

**强烈推荐：**使用 CC Switch 一键切换配置（[点击前往一键接入助手](/setting.html)）

### **第二推荐：永久配置（推荐）**

#### **方法1：通过系统环境变量设置（图形界面）**

右键点击“此电脑”，选择“属性”

点击“高级系统设置”

点击“环境变量”

在“用户变量”区域，点击“新建”，分别添加：

变量名：ANTHROPIC_BASE_URL，变量值：__SITE_ORIGIN__

变量名：ANTHROPIC_AUTH_TOKEN，变量值：您的Token

点击“确定”保存，并重启终端窗口。

#### **方法2：通过 PowerShell 配置**

在 PowerShell 中运行以下命令设置用户级环境变量：

```powershell
setx ANTHROPIC_BASE_URL "__SITE_ORIGIN__"
setx ANTHROPIC_AUTH_TOKEN "您的Token"
```
**(提示：运行完成后，需要关闭当前 PowerShell 并重新打开一个新窗口才会生效。)**

#### **验证配置**

在 PowerShell 中查看已设置的环境变量：

```powershell
echo $env:ANTHROPIC_AUTH_TOKEN
echo $env:ANTHROPIC_BASE_URL
```

### **第三推荐：临时配置（当前会话有效）**

如果您只想在当前窗口临时使用，可以在 PowerShell 中直接执行：

```powershell
$env:ANTHROPIC_BASE_URL="__SITE_ORIGIN__"
$env:ANTHROPIC_AUTH_TOKEN="您的Token"
```

---

## **步骤 3：开始使用**

配置好环境变量后，在您的项目目录下使用`cmd`等的终端运行：

```bash
cd your-project-folder
claude 你是什么大模型
```

当然, 你也可以在**VS Code**中安装插件`Claude Code for VS Code`来获得更好的使用体验。

详细的图文教程可查看：[在 VS Code 中使用 Claude Code 图文指南](https://ucngkdwd50uz.feishu.cn/wiki/BmcvwIT4bimiErk8O9McCQUqnFb)

完成后，就可以开始在终端里和您的 AI 编程搭档一起写代码了！🚀

---

## **常见问题**

### **❓ 提示找不到 claude 命令**

**解决方法**：

- 确认 PowerShell 安装脚本是否执行成功且无报错。

- 安装后必须重新启动终端窗口（关闭并重新打开），才能让系统识别到新的命令。

- 检查环境变量 PATH 中是否包含了 Claude 的安装路径（通常在用户目录的 AppData 下）。

### **❓ 环境变量设置后不生效**

**解决方法**：

- 完全关闭所有终端窗口（包括 VS Code 中的内置终端），重新打开。
- 在终端输入 `echo $env:ANTHROPIC_AUTH_TOKEN` 或 `echo $env:ANTHROPIC_BASE_URL`验证环境变量是否成功设置。
- 如果是永久配置，确保没有多余的空格。

### **❓ PowerShell 脚本执行被阻止**

**解决方法**：

```powershell
# 以管理员身份运行 PowerShell
Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
```
---

## **下一步**

✅ 安装完成后，您可以：

- 在任意项目目录使用 `claude` 命令
- 前往 [余额查询](/usage) 页面查看 API 使用情况
- 查看官方文档了解更多功能</script>

## **步骤 1：安装 Claude Code（安装过可跳过）**

执行以下官方安装脚本：
```bash
curl -fsSL https://claude.ai/install.sh | bash
```

### **验证安装**

```bash
claude --version
```

---

## **步骤 2：配置环境变量**

您需要配置两个环境变量：

ANTHROPIC_AUTH_TOKEN：您的授权令牌（格式：sk_...）

ANTHROPIC_BASE_URL：API 服务地址（本站提供的连接点 URL）

### **第一推荐：CC Switch（强烈推荐）**

**强烈推荐：**使用 CC Switch 一键切换配置（[点击前往一键接入助手](/setting.html)）

### **第二推荐：永久配置（推荐）**

#### **检查当前使用的 Shell**

```bash
echo $SHELL
```

- 如果输出 `/bin/zsh`，您使用的是 **Zsh**（macOS 默认）
- 如果输出 `/bin/bash`，您使用的是 **Bash**

#### **Zsh 配置（macOS 默认）**

将环境变量写入配置文件：

```bash
# 写入中转地址
echo 'export ANTHROPIC_BASE_URL="__SITE_ORIGIN__"' >> ~/.zshrc

# 写入您的 Token
echo 'export ANTHROPIC_AUTH_TOKEN="您的Token"' >> ~/.zshrc

# 使配置立即生效
source ~/.zshrc
```

#### **Bash 配置**

将环境变量写入配置文件：

```bash
echo -e '\nexport ANTHROPIC_AUTH_TOKEN="您的Token"' >> ~/.bash_profile
echo -e '\nexport ANTHROPIC_BASE_URL="__SITE_ORIGIN__"' >> ~/.bash_profile
echo -e '\nexport ANTHROPIC_AUTH_TOKEN="您的Token"' >> ~/.bashrc
echo -e '\nexport ANTHROPIC_BASE_URL="__SITE_ORIGIN__"' >> ~/.bashrc
```

重新加载配置：
```bash
source ~/.bash_profile
source ~/.bashrc
```

#### **验证配置**
运行以下命令，如果能正确打印出地址和 Token，说明配置成功：
```bash
echo $ANTHROPIC_AUTH_TOKEN
echo $ANTHROPIC_BASE_URL
```

### **第三推荐：临时配置（当前会话有效）**

```bash
export ANTHROPIC_BASE_URL="__SITE_ORIGIN__"
export ANTHROPIC_AUTH_TOKEN="您的Token"
```

## **步骤 3：开始使用**

配置好环境变量后，在您的项目目录下运行：

```bash
cd your-project-folder
claude 你是什么大模型
```
当然, 你也可以在**VS Code**中安装插件`Claude Code for VS Code`来获得更好的使用体验。

详细的图文教程可查看：[在 VS Code 中使用 Claude Code 图文指南](https://ucngkdwd50uz.feishu.cn/wiki/BmcvwIT4bimiErk8O9McCQUqnFb)

完成后，就可以开始在终端里和您的 AI 编程搭档一起写代码了！🚀

    <script>
      (function () {
        var origin = window.location.origin;
        document.querySelectorAll('script[type="text/plain"]').forEach(function (s) {
          if (s.textContent.indexOf('__SITE_ORIGIN__') !== -1) {
            s.textContent = s.textContent.split('__SITE_ORIGIN__').join(origin);
          }
        });
        function walkReplace(n) {
          if (!n) return;
          if (n.nodeType === 3) {
            if (n.nodeValue.indexOf('__SITE_ORIGIN__') !== -1) {
              n.nodeValue = n.nodeValue.split('__SITE_ORIGIN__').join(origin);
            }
            return;
          }
          if (n.tagName === 'SCRIPT' && n.getAttribute('type') !== 'text/plain') return;
          if (n.tagName === 'STYLE') return;
          Array.prototype.slice.call(n.childNodes).forEach(walkReplace);
        }
        walkReplace(document.body);

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function renderInline(text) {
          // 先做转义，避免把用户文本当 HTML 执行
          let s = escapeHtml(text);

          // 行内代码
          s = s.replace(/`([^`]+)`/g, function (_, code) {
            return '<code class="inline-code">' + code + "</code>";
          });

          // 加粗
          s = s.replace(/\*\*([^*]+)\*\*/g, function (_, t) {
            return '<strong>' + t + "</strong>";
          });

          // 链接 [label](url)
          s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, url) {
            return (
              '<a href="' +
              url +
              '" target="_blank" rel="noopener" class="inline-link">' +
              label +
              "</a>"
            );
          });

          return s;
        }

        function parseMarkdown(md) {
          md = String(md || "").replace(/\r\n/g, "\n");
          var lines = md.split("\n");
          var out = "";

          var i = 0;
          var seenTopH1 = false;

          function isFenceStart(line) {
            return /^```/.test(line.trim());
          }

          function fenceLang(line) {
            var m = line.trim().match(/^```(\w+)?\s*$/);
            return m && m[1] ? m[1] : "";
          }

          function isHrLine(trimmed) {
            if (trimmed === "---") return true;
            if (/^=+\s*$/.test(trimmed)) return true;
            if (/^#\s*=+\s*$/.test(trimmed)) return true;
            if (/^#\s*-{3,}\s*$/.test(trimmed)) return true;
            return false;
          }

          function renderHeading(line) {
            var m = line.trim().match(/^(#{1,6})\s+(.+)$/);
            if (!m) return "";
            var level = m[1].length;
            var text = m[2];
            var tag;
            if (level === 1) {
              tag = seenTopH1 ? "h2" : "h1";
              seenTopH1 = true;
            } else {
              tag = "h" + Math.min(level, 6);
            }
            return "<" + tag + ">" + renderInline(text) + "</" + tag + ">";
          }

          function flushParagraph(buf) {
            if (!buf.length) return "";
            // 把换行当空格，避免出现“断行即断句”
            var t = buf.join(" ").replace(/\s+/g, " ").trim();
            buf.length = 0;
            if (!t) return "";
            return "<p>" + renderInline(t) + "</p>";
          }

          while (i < lines.length) {
            var raw = lines[i];
            var trimmed = raw.trim();

            if (!trimmed) {
              i++;
              continue;
            }

            // code fence
            if (isFenceStart(raw)) {
              var lang = fenceLang(raw);
              i++;
              var codeLines = [];
              while (i < lines.length && !isFenceStart(lines[i])) {
                codeLines.push(lines[i]);
                i++;
              }
              // skip closing fence
              if (i < lines.length && isFenceStart(lines[i])) i++;

              var code = escapeHtml(codeLines.join("\n"));
              out +=
                '<pre><code>' + code + (lang ? "</code></pre>" : "</code></pre>");
              continue;
            }

            if (isHrLine(trimmed)) {
              out += '<hr class="my-6 border-slate-700/60" />';
              i++;
              continue;
            }

            // heading
            if (/^#{1,6}\s+/.test(trimmed)) {
              out += renderHeading(trimmed);
              i++;
              continue;
            }

            // blockquote
            if (/^>\s?/.test(trimmed)) {
              var quoteLines = [];
              while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
                quoteLines.push(lines[i].trim().replace(/^>\s?/, ""));
                i++;
              }
              var quoteText = quoteLines.join("\n");
              var parts = quoteText.split("\n").map(function (p) {
                return "<p>" + renderInline(p) + "</p>";
              });
              out += '<blockquote>' + parts.join("") + "</blockquote>";
              continue;
            }

            // unordered list
            var ulMatch = raw.match(/^\s*[-*]\s+(.+)$/);
            if (ulMatch) {
              out += '<ul class="mt-3">';
              while (i < lines.length) {
                var line = lines[i];
                var m = line.match(/^\s*[-*]\s+(.+)$/);
                if (!m) break;
                var item = m[1].trim();
                out += "<li>" + renderInline(item) + "</li>";
                i++;
              }
              out += "</ul>";
              continue;
            }

            // ordered list
            var olMatch = raw.match(/^\s*\d+\.\s+(.+)$/);
            if (olMatch) {
              out += '<ol class="mt-3">';
              while (i < lines.length) {
                var line2 = lines[i];
                var m2 = line2.match(/^\s*(\d+)\.\s+(.+)$/);
                if (!m2) break;
                var item2 = m2[2].trim();
                out += "<li>" + renderInline(item2) + "</li>";
                i++;
              }
              out += "</ol>";
              continue;
            }

            // paragraph (collect until blank line or block starter)
            var buf = [];
            while (i < lines.length) {
              var l = lines[i];
              var t = l.trim();
              if (!t) break;
              if (isFenceStart(l) || isHrLine(t) || /^#{1,6}\s+/.test(t) || /^>\s?/.test(t) || /^\s*[-*]\s+/.test(t) || /^\s*\d+\.\s+/.test(t)) {
                break;
              }
              buf.push(t);
              i++;
            }
            out += flushParagraph(buf);
          }

          return out;
        }

        var tabButtons = Array.prototype.slice.call(document.querySelectorAll("[data-tab-btn]"));
        var tabPanels = Array.prototype.slice.call(document.querySelectorAll("[data-tab-panel]"));

        var TRANSFER_BASE_URL = window.location.origin;
        function normalizeMd(md) {
          // 统一把示例域名替换为真实中转地址，并把“余额查询”链接指向本地路由
          return String(md || "")
            // URL 示例已在文本中替换为真实中转地址，这里无需再额外处理
            .replaceAll(TRANSFER_BASE_URL + "/usage/", "/usage")
            .replaceAll(TRANSFER_BASE_URL + "/usage", "/usage");
        }

        var mdSources = {
          windows: document.getElementById("md-windows")
            ? normalizeMd(document.getElementById("md-windows").textContent)
            : "",
          macos: document.getElementById("md-macos")
            ? normalizeMd(document.getElementById("md-macos").textContent)
            : "",
        };

        var docEls = {
          windows: document.getElementById("tabDoc-windows"),
          macos: document.getElementById("tabDoc-macos"),
        };

        var renderedKeys = {};

        function renderIfNeeded(key) {
          if (!docEls[key] || renderedKeys[key]) return;
          var md = mdSources[key] || "";
          var html = "";
          if (window.marked && typeof window.marked.parse === "function") {
            html = window.marked.parse(md);
          } else {
            // marked 未加载时的兜底：至少避免页面空白
            html = "<p>Markdown 渲染服务不可用。</p>";
          }
          docEls[key].innerHTML = html;
          renderedKeys[key] = true;
        }

        function setActive(key) {
          tabButtons.forEach(function (b) {
            b.classList.toggle("active", b.dataset.tabBtn === key);
          });
          tabPanels.forEach(function (p) {
            var isActive = p.dataset.tabPanel === key;
            p.classList.toggle("active", isActive);
            p.setAttribute("aria-hidden", isActive ? "false" : "true");
          });

          renderIfNeeded(key);
        }

        tabButtons.forEach(function (b) {
          b.addEventListener("click", function () {
            setActive(b.dataset.tabBtn);
          });
        });

        // 默认选中 Windows
        setActive("windows");
      })();
    </script>
